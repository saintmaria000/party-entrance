<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Entrance | Admin</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <main class="admin-page">
    <section class="admin-panel">
      <header class="admin-header">
        <p class="admin-eyebrow">Party Entrance</p>
        <h1 class="admin-title">Entries</h1>
        <p class="admin-description">
          登録一覧を確認します。
        </p>
         <div class="admin-actions">
            <a href="./bulk.html" class="admin-link-button">Bulk Mail</a>
        </div>
      </header>

      <form id="adminLoginForm" class="admin-login-form">
        <label class="admin-label" for="adminPassword">Password</label>
        <div class="admin-login-row">
          <input
            id="adminPassword"
            class="admin-input"
            type="password"
            name="password"
            placeholder="password"
            autocomplete="current-password"
          />
          <button type="submit" class="admin-button">Load</button>
        </div>
      </form>

      <div id="adminMessage" class="admin-message" aria-live="polite"></div>

      <section id="adminSummary" class="admin-summary" hidden>
        <p>Total: <span id="totalCount">0</span></p>
      </section>

      <section id="adminTableWrap" class="admin-table-wrap" hidden>
        <table class="admin-table">
          <thead>
            <tr>
              <th>No.</th>
              <th>Name</th>
              <th>Mail</th>
              <th>Time</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </section>
    </section>
  </main>

  <script src="./admin.js" defer></script>
</body>
</html>
