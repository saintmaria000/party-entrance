<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Entrance | Bulk Mail</title>
  <link rel="stylesheet" href="./bulk.css" />
</head>
<body>
  <main class="bulk-page">
    <section class="bulk-panel">
      <header class="bulk-header">
        <p class="bulk-eyebrow">Party Entrance</p>
        <h1 class="bulk-title">Bulk Mail</h1>
        <p class="bulk-description">登録済みメールアドレス宛に一斉送信します。</p>
      </header>

      <form id="bulkForm" class="bulk-form">
        <label class="bulk-label" for="bulkPassword">Password</label>
        <input
          id="bulkPassword"
          class="bulk-input"
          type="password"
          name="password"
          placeholder="password"
          autocomplete="current-password"
        />

        <label class="bulk-label" for="bulkSubject">Subject</label>
        <input
          id="bulkSubject"
          class="bulk-input"
          type="text"
          name="subject"
          placeholder="件名"
        />

        <label class="bulk-label" for="bulkText">Message</label>
        <textarea
          id="bulkText"
          class="bulk-textarea"
          name="text"
          placeholder="本文"
        ></textarea>

        <button type="submit" id="bulkSubmit" class="bulk-button">
          Send
        </button>
      </form>

      <div id="bulkMessage" class="bulk-message" aria-live="polite"></div>

      <section id="bulkResult" class="bulk-result" hidden>
        <p>Total: <span id="bulkTotal">0</span></p>
        <p>Success: <span id="bulkSuccess">0</span></p>
        <p>Fail: <span id="bulkFail">0</span></p>
      </section>
    </section>
  </main>

  <script src="./bulk.js" defer></script>
</body>
</html>
