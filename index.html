<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Entrance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="form-page">

  <div class="bg"></div>
  <div class="overlay"></div>

  <div id="globalError" class="announcement" aria-live="polite"></div>

  <main class="page">
    <section class="form-wrap">

      <p class="copy">
        You are invited.
        5/4-5 Free Party
        Are u Join?
      </p>

      <form id="inviteForm" class="form" novalidate>

        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required autocomplete="name" />
          <p class="error" id="nameError" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="email">Mail</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
          <p class="error" id="emailError" aria-live="polite"></p>
        </div>

        <div class="field turnstile-field">
          <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAACvvfHHYstTRtB2X"
            data-theme="dark"
            data-response-field="true"
            data-response-field-name="cf-turnstile-response">
          </div>
          <p class="error" id="turnstileError" aria-live="polite"></p>
        </div>

        <button id="submitBtn" class="enter" type="submit">Enter</button>

      </form>

    </section>
  </main>

  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js"
    async
    defer>
  </script>
  <script src="script.js"></script>
</body>
</html>
